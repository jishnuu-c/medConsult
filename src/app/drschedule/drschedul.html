<div class="schedule-container">
  <div class="schedule-header">
    <h2 class="schedule-title">Doctor Schedule</h2>
    <button class="add-schedule-btn"  (click)="goToAddSchedule()">
      <span class="btn-icon">+</span>
      Add Schedule
    </button>
  </div>

  <div class="schedule-wrapper" *ngIf="doctor?.length">
    <div class="schedule-card" *ngFor="let d of doctor">
      <div class="day-badge">{{ d.dayOfWeek }}</div>
      <div class="schedule-details">
        <div class="time-block">
          <span class="time-label">Start</span>
          <span class="time-value">{{ d.startTime }}</span>
        </div>
        <div class="divider">→</div>
        <div class="time-block">
          <span class="time-label">End</span>
          <span class="time-value">{{ d.endTime }}</span>
        </div>
      </div>
      <div class="type-tag">{{ d.scheduleType }}</div>

      <button class="delete-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
        </svg>
        Delete
      </button>
    </div>
  </div>
</div>
