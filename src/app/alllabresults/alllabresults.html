<div>
  <h3 class="lab-title">All Lab Results</h3>

  <div class="lab-list">
    <div
      class="lab-card"
      *ngFor="let result of labResults"
      (click)="goTolabresult(result.patientId)"
    >
      <div class="lab-card-left">
        <div class="panel-icon">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
        </div>
        <div class="lab-card-info">
          <span class="panel-name">{{ result.user.fullName }}</span>
         
        </div>
      </div>
    </div>
  </div>
</div>
